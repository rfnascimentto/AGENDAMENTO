<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agendamento de Prova</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 { text-align:center; }

.field {
  display:flex;
  align-items:center;
  border:1px solid #ccc;
  border-radius:8px;
  padding:10px;
  margin-bottom:12px;
  position:relative;
}

.field i { margin-right:10px; }

.field input, .field select {
  border:none;
  outline:none;
  width:100%;
}

.lista {
  position:absolute;
  top:45px;
  left:0;
  right:0;
  background:#fff;
  border:1px solid #ccc;
  max-height:150px;
  overflow:auto;
  display:none;
  z-index:10;
}

.lista div {
  padding:8px;
  cursor:pointer;
}

.lista div:hover { background:#eee; }

button {
  width:100%;
  padding:12px;
  background:#007bff;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.success {
  text-align:center;
  margin-top:10px;
  color:green;
}
</style>
</head>

<body>

<div class="container">
<h2>Agendamento de Prova</h2>

<form id="form">

<div class="field">
<i class="fa fa-user"></i>
<input type="text" name="nome" placeholder="Nome do aluno" required>
</div>

<div class="field">
<i class="fa fa-graduation-cap"></i>
<input type="text" name="curso" placeholder="Curso" required>
</div>

<div class="field">
<i class="fa fa-id-card"></i>
<input type="text" name="ra" placeholder="RA" required>
</div>

<div class="field">
<i class="fa fa-lock"></i>
<input type="password" id="senha" name="senha" placeholder="Senha (mín. 4 caracteres)" required>
</div>

<div class="field">
<i class="fa fa-book"></i>
<input type="text" id="disciplinaInput" placeholder="Digite a disciplina" required>
<input type="hidden" name="disciplina" id="disciplinaHidden">
<div id="lista" class="lista"></div>
</div>

<div class="field">
<i class="fa fa-calendar"></i>
<input type="date" id="data" name="data"
min="2026-06-08"
max="2026-06-12"
required>
</div>

<div class="field">
<i class="fa fa-clock"></i>
<select name="turno" required>
<option value="">Turno</option>
<option>Manhã</option>
<option>Tarde</option>
<option>Noite</option>
</select>
</div>

<button type="submit">Agendar Prova</button>
<div id="msg" class="success"></div>

</form>
</div>

<script>
// 🔹 DISCIPLINAS
const disciplinas = ["Administração","Algoritmos","Banco de Dados","Engenharia de Software","Matemática","História","Física","Química"];

const input = document.getElementById("disciplinaInput");
const lista = document.getElementById("lista");
const hidden = document.getElementById("disciplinaHidden");

input.addEventListener("input", () => {
  const val = input.value.toLowerCase();
  lista.innerHTML = "";

  if (!val) return lista.style.display="none";

  disciplinas.filter(d => d.toLowerCase().includes(val))
  .forEach(d => {
    const div = document.createElement("div");
    div.textContent = d;

    div.onclick = () => {
      input.value = d;
      hidden.value = d;
      lista.style.display = "none";
    };

    lista.appendChild(div);
  });

  lista.style.display = "block";
});

// 🔥 ENVIO CORRETO
document.getElementById("form").addEventListener("submit", async e => {
  e.preventDefault();

  const senha = document.getElementById("senha").value;
  const data = document.getElementById("data").value;

  const datasPermitidas = [
    "2026-06-08",
    "2026-06-09",
    "2026-06-10",
    "2026-06-11",
    "2026-06-12"
  ];

  if (senha.length < 4) {
    alert("Senha deve ter pelo menos 4 caracteres");
    return;
  }

  if (!datasPermitidas.includes(data)) {
    alert("Escolha entre 08 e 12 de junho");
    return;
  }

  if (!hidden.value) {
    alert("Selecione uma disciplina válida");
    return;
  }

  const formData = new FormData(e.target);
  const payload = Object.fromEntries(formData.entries());

  try {
    const res = await fetch("https://script.google.com/macros/s/AKfycbxDouiioXoYngBpDIjyahWT87hwEKA-kJeHIDRhioRT/dev", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const resposta = await res.text();
    console.log("Resposta:", resposta);

    document.getElementById("msg").innerText = "✅ Agendamento realizado com sucesso!";
    e.target.reset();

  } catch (erro) {
    console.error("Erro:", erro);
    alert("Erro ao enviar. Verifique sua conexão ou API.");
  }
});
</script>

</body>
</html>
